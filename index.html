<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>懶惰熊 · Portfolio</title>
  <meta name="description" content="懶惰熊的作品集 — 六張會被翻開的魔法卡。" />
  <meta name="theme-color" content="#FBFDFF" />
  <meta property="og:title" content="懶惰熊 · Portfolio" />
  <meta property="og:description" content="六張會被翻開的魔法卡。" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+TC:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas class="starfield" id="starfield" aria-hidden="true"></canvas>
  <div class="sparkles" id="sparkles" aria-hidden="true"></div>

  <header class="top-bar">
    <a class="brand" href="#top" aria-label="懶惰熊">
      <svg class="brand__sigil" viewBox="0 0 32 32" aria-hidden="true">
        <circle cx="16" cy="16" r="14" fill="none" stroke="#6BA3D6" stroke-width="0.8"/>
        <circle cx="16" cy="16" r="10" fill="none" stroke="#C9A876" stroke-width="0.5" stroke-dasharray="1 2"/>
        <polygon points="16,5 26,23 6,23" fill="none" stroke="#6BA3D6" stroke-width="0.6"/>
        <polygon points="16,27 6,9 26,9" fill="none" stroke="#6BA3D6" stroke-width="0.6"/>
        <circle cx="16" cy="16" r="2" fill="#1B2C4A"/>
      </svg>
      <span class="brand__name">懶惰熊</span>
      <span class="brand__en">Lazy Bear</span>
    </a>
    <span class="top-bar__meta">A Magical Portfolio · 二〇二六</span>
  </header>

  <main id="top">
    <section class="hero">
      <div class="hero__ornament hero__ornament--left" aria-hidden="true">
        <svg viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="90" fill="none" stroke="#B8D4E8" stroke-width="0.6"/>
          <circle cx="100" cy="100" r="70" fill="none" stroke="#C9A876" stroke-width="0.4" stroke-dasharray="1 4"/>
          <polygon points="100,30 158,140 42,140" fill="none" stroke="#6BA3D6" stroke-width="0.5"/>
          <polygon points="100,170 42,60 158,60" fill="none" stroke="#6BA3D6" stroke-width="0.5"/>
        </svg>
      </div>
      <div class="hero__ornament hero__ornament--right" aria-hidden="true">
        <svg viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="90" fill="none" stroke="#B8D4E8" stroke-width="0.6"/>
          <circle cx="100" cy="100" r="70" fill="none" stroke="#C9A876" stroke-width="0.4" stroke-dasharray="1 4"/>
          <path d="M100,30 L120,80 L170,90 L130,125 L140,175 L100,150 L60,175 L70,125 L30,90 L80,80 Z" fill="none" stroke="#6BA3D6" stroke-width="0.5"/>
        </svg>
      </div>

      <p class="hero__eyebrow">Featured · 六張魔法卡</p>
      <h1 class="hero__title">我的作品</h1>
      <p class="hero__intro">懶惰熊把那些原本要花時間、花腦力、花情緒的小事，都做成了網站 — 一邊偷懶，一邊蓋出來的數位魔法集。</p>
      <div class="hero__divider" aria-hidden="true">
        <svg viewBox="0 0 240 20">
          <line x1="0" y1="10" x2="95" y2="10" stroke="#B8D4E8" stroke-width="0.8"/>
          <g transform="translate(120 10)">
            <circle r="6" fill="none" stroke="#C9A876" stroke-width="0.7"/>
            <path d="M0,-4 L1.2,-1.2 L4,0 L1.2,1.2 L0,4 L-1.2,1.2 L-4,0 L-1.2,-1.2 Z" fill="#C9A876"/>
          </g>
          <line x1="145" y1="10" x2="240" y2="10" stroke="#B8D4E8" stroke-width="0.8"/>
        </svg>
      </div>
    </section>

    <section class="works" id="works">
      <div class="cards" id="cards"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__sigil" aria-hidden="true">
      <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="46" fill="none" stroke="#A5C9E5" stroke-width="0.6"/>
        <circle cx="50" cy="50" r="36" fill="none" stroke="#C9A876" stroke-width="0.4" stroke-dasharray="1 3"/>
        <polygon points="50,18 79,68 21,68" fill="none" stroke="#6BA3D6" stroke-width="0.6"/>
        <polygon points="50,82 21,32 79,32" fill="none" stroke="#6BA3D6" stroke-width="0.6"/>
      </svg>
    </div>
    <p class="footer__line">© 2026 · 懶惰熊 · Lazy Bear</p>
    <p class="footer__line footer__line--muted">封印於白、淺藍與燭金之間。</p>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
